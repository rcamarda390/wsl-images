name: Build agentmemory

on:
  push:
    branches: [main]
    paths:
      - "agentmemory/**"
      - ".github/workflows/build-agentmemory.yml"
  pull_request:
    branches: [main]
    paths:
      - "agentmemory/**"
  workflow_dispatch:
    inputs:
      agentmemory_version:
        description: "@agentmemory/agentmemory npm version"
        required: false
        default: "0.9.21"
      push_images:
        description: "Push images to ghcr.io"
        required: false
        default: "true"
        type: boolean

env:
  REPO_OWNER: ${{ github.repository_owner }}
  AGENTMEMORY_VERSION: ${{ inputs.agentmemory_version || '0.9.21' }}
  III_VERSION: "0.11.2"

jobs:
  # ---------------------------------------------------------------------------
  # Mirror upstream images (busybox, iiidev/iii) to ghcr.io so they can be
  # pulled from a single registry and imported into Artifactory as a set.
  # ---------------------------------------------------------------------------
  mirror-upstream:
    name: Mirror upstream images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror busybox:1.36
        run: |
          docker pull busybox:1.36
          docker tag busybox:1.36 \
            ghcr.io/${{ env.REPO_OWNER }}/wsl-images/busybox:1.36
          if [[ "${{ inputs.push_images }}" != "false" && "${{ github.event_name }}" != "pull_request" ]]; then
            docker push ghcr.io/${{ env.REPO_OWNER }}/wsl-images/busybox:1.36
          fi

      - name: Mirror iiidev/iii:${{ env.III_VERSION }}
        run: |
          docker pull iiidev/iii:${{ env.III_VERSION }}
          docker tag iiidev/iii:${{ env.III_VERSION }} \
            ghcr.io/${{ env.REPO_OWNER }}/wsl-images/iii:${{ env.III_VERSION }}
          if [[ "${{ inputs.push_images }}" != "false" && "${{ github.event_name }}" != "pull_request" ]]; then
            docker push ghcr.io/${{ env.REPO_OWNER }}/wsl-images/iii:${{ env.III_VERSION }}
          fi

  # ---------------------------------------------------------------------------
  # Build the custom agentmemory image (Node 20 Alpine + agentmemory npm)
  # ---------------------------------------------------------------------------
  build-agentmemory:
    name: Build agentmemory image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER }}/wsl-images/agentmemory
          tags: |
            type=raw,value=${{ env.AGENTMEMORY_VERSION }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push agentmemory image
        uses: docker/build-push-action@v5
        with:
          context: ./agentmemory
          file: ./agentmemory/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images != 'false' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENTMEMORY_VERSION=${{ env.AGENTMEMORY_VERSION }}
            NODE_VERSION=22
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image runs
        run: |
          docker run --rm \
            ghcr.io/${{ env.REPO_OWNER }}/wsl-images/agentmemory:${{ env.AGENTMEMORY_VERSION }} \
            node /app/dist/cli.mjs --version || true

  # ---------------------------------------------------------------------------
  # Smoke-test: bring up the full stack and verify /livez responds
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke test (full stack)
    runs-on: ubuntu-latest
    needs: [mirror-upstream, build-agentmemory]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create minimal .env for smoke test
        run: |
          echo "REGISTRY=ghcr.io/${{ env.REPO_OWNER }}/wsl-images" > agentmemory/.env
          echo "AGENTMEMORY_VERSION=${{ env.AGENTMEMORY_VERSION }}" >> agentmemory/.env
          echo "AGENTMEMORY_III_VERSION=${{ env.III_VERSION }}" >> agentmemory/.env
          # No LLM key — runs in noop mode, which is sufficient for smoke test

      - name: Start stack
        run: |
          cd agentmemory
          docker compose up -d
          echo "Waiting for /livez..."
          for i in $(seq 1 18); do
                      if curl -sf http://localhost:3111/agentmemory/mcp/tools; then
              echo; echo "Stack is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Stack did not become healthy in 90s"
          docker compose logs
          exit 1

      - name: Verify memory_save tool is registered
        run: |
          TOOLS=$(curl -sf http://localhost:3111/agentmemory/mcp/tools)
          echo "$TOOLS"
          echo "$TOOLS" | grep -q "memory_save" && echo "memory_save tool found — PASS"

      - name: Tear down
        if: always()
        run: cd agentmemory && docker compose down -v
