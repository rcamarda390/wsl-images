name: Mirror litellm

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/mirror-litellm.yml"
  workflow_dispatch:
    inputs:
      litellm_version:
        description: "Docker Hub tag to mirror (e.g. v1.87.1)"
        required: false
        default: "v1.87.1"
      push_images:
        description: "Push images to ghcr.io"
        required: false
        default: "true"
        type: boolean

env:
  REPO_OWNER: ${{ github.repository_owner }}
  LITELLM_VERSION: ${{ inputs.litellm_version || 'v1.87.1' }}

jobs:
  mirror-litellm:
    name: Mirror litellm image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4

      - name: Mirror litellm/litellm to ghcr.io
        if: ${{ inputs.push_images != 'false' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO_OWNER }}/wsl-images/litellm:${{ env.LITELLM_VERSION }} \
            --tag ghcr.io/${{ env.REPO_OWNER }}/wsl-images/litellm:latest \
            docker.io/litellm/litellm:${{ env.LITELLM_VERSION }}

      - name: Inspect mirrored manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ env.REPO_OWNER }}/wsl-images/litellm:${{ env.LITELLM_VERSION }}
