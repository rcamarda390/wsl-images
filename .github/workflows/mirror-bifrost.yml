name: Mirror bifrost

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/mirror-bifrost.yml"
  workflow_dispatch:
    inputs:
      bifrost_version:
        description: "Docker Hub tag to mirror (e.g. v1.5.8)"
        required: false
        default: "v1.5.8"
      push_images:
        description: "Push images to ghcr.io"
        required: false
        default: "true"
        type: boolean

env:
  REPO_OWNER: ${{ github.repository_owner }}
  BIFROST_VERSION: ${{ inputs.bifrost_version || 'v1.5.8' }}

jobs:
  mirror-bifrost:
    name: Mirror bifrost image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Mirror maximhq/bifrost to ghcr.io
        if: ${{ inputs.push_images != 'false' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO_OWNER }}/wsl-images/bifrost:${{ env.BIFROST_VERSION }} \
            --tag ghcr.io/${{ env.REPO_OWNER }}/wsl-images/bifrost:latest \
            docker.io/maximhq/bifrost:${{ env.BIFROST_VERSION }}

      - name: Inspect mirrored manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ env.REPO_OWNER }}/wsl-images/bifrost:${{ env.BIFROST_VERSION }}
