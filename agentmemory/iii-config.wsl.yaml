# =============================================================================
# iii-engine config for WSL2 / Docker deployment
# =============================================================================
# Based on agentmemory's upstream iii-config.docker.yaml with ONE change:
# iii-exec is REMOVED because the agentmemory worker runs in its own
# container and connects to the engine externally via iii-sdk WebSocket
# (port 49134). The engine does not need to spawn Node itself.
# =============================================================================

workers:
  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 180000
      cors:
        allowed_origins:
          - "http://localhost:3111"
          - "http://localhost:3113"
          - "http://127.0.0.1:3111"
          - "http://127.0.0.1:3113"
        allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: /data/state_store.db

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-pubsub
    config:
      adapter:
        name: local

  - name: iii-cron
    config:
      adapter:
        name: kv

  - name: iii-stream
    config:
      port: 3112
      host: 0.0.0.0
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: /data/stream_store

  - name: iii-observability
    config:
      enabled: true
      service_name: agentmemory
      exporter: memory
      sampling_ratio: 0.1
      metrics_enabled: true
      logs_enabled: true
      logs_console_output: false

  # NOTE: iii-exec intentionally absent.
  # The agentmemory worker (agentmemory-worker container) connects here
  # externally via III_ENGINE_URL=ws://iii-engine:49134.
